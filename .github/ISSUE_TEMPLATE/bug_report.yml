name: Bug Report
description: File a bug report to help us improve
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: input
    id: version
    attributes:
      label: App Version
      description: What version of CoinCeeper are you running?
      placeholder: "1.0.48"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: What device are you using?
      placeholder: "Pixel 7 / iPhone 14"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS Version
      description: What OS version?
      placeholder: "Android 14 / iOS 17"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to...
        2. Tap on...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Any relevant logs or screenshots
