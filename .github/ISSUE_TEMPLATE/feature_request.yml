name: Feature Request
description: Suggest an idea for CoinCeeper Wallet
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions?

  - type: dropdown
    id: blockchain
    attributes:
      label: Related Blockchain
      description: Which blockchain(s) does this relate to?
      multiple: true
      options:
        - Bitcoin
        - Ethereum
        - BSC
        - Polygon
        - Avalanche
        - Arbitrum
        - Tron
        - Solana
        - XRP
        - Polkadot
        - General (all chains)
